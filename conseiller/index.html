<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ton conseiller d'orientation</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f7f6f3;
    color: #1a1a1a;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }
  #app {
    max-width: 640px;
    width: 100%;
    padding: 1.5rem 1rem;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  h1 { font-size: 18px; font-weight: 600; margin: 0 0 4px; }
  p.subtitle { color: #666; font-size: 13px; margin: 0 0 1rem; }
  #chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 0.5rem 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 85%;
    padding: 12px 14px;
    border-radius: 14px;
    font-size: 14.5px;
    line-height: 1.5;
    white-space: pre-wrap;
  }
  .msg.user {
    align-self: flex-end;
    background: #d97757;
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: #fff;
    border: 1px solid #e5e3dd;
    border-bottom-left-radius: 4px;
  }
  .msg.thinking {
    align-self: flex-start;
    background: #fff;
    border: 1px solid #e5e3dd;
    color: #999;
    font-style: italic;
  }
  #input-row {
    display: flex;
    gap: 8px;
    padding-top: 12px;
    border-top: 1px solid #e5e3dd;
  }
  #msg-input {
    flex: 1;
    padding: 12px 14px;
    border-radius: 20px;
    border: 1px solid #ddd9d0;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    max-height: 100px;
  }
  #send-btn {
    padding: 0 20px;
    border-radius: 20px;
    border: none;
    background: #d97757;
    color: #fff;
    font-weight: 500;
    cursor: pointer;
    font-size: 14px;
  }
  #send-btn:disabled { opacity: 0.5; cursor: default; }
  #person-gate {
    display: flex;
    flex-direction: column;
    justify-content: center;
    height: 100vh;
  }
  .person-btn {
    display: block; width: 100%; padding: 16px; margin-bottom: 10px;
    border-radius: 12px; border: 1px solid #ddd9d0; background: #fff;
    font-size: 15px; font-weight: 500; cursor: pointer; text-align: left;
  }
  .person-btn:hover { border-color: #d97757; }
</style>
</head>
<body>
<div id="app">

  <div id="person-gate">
    <h1>Qui es-tu ?</h1>
    <p class="subtitle">Pour retrouver la conversation là où tu l'as laissée.</p>
    <button class="person-btn" id="btn-keziah">Kéziah</button>
  </div>

  <div id="chat-app" style="display:none; flex-direction:column; height:100%;">
    <h1>Ton conseiller d'orientation</h1>
    <p class="subtitle">Pose-moi tes questions, sans pression. Ton père peut relire nos échanges plus tard.</p>
    <div id="chat-window"></div>
    <div id="input-row">
      <textarea id="msg-input" rows="1" placeholder="Écris ton message..."></textarea>
      <button id="send-btn">Envoyer</button>
    </div>
  </div>

</div>

<script>
const SUPABASE_URL = "https://bvuacfwjikjuzwrtddtl.supabase.co";
const SUPABASE_KEY = "sb_publishable_srk5hKxrqAlGcjIJnzS_ew_xFfMlQDe";
const EDGE_FUNCTION_PATH = "/functions/v1/hyper-service";

let currentPerson = null;
let messages = [];

function normalizePersonKey(name) {
  return name.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

async function supaRequest(method, path, body) {
  const res = await fetch(SUPABASE_URL + "/rest/v1/" + path, {
    method: method,
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json",
      "Prefer": body ? "resolution=merge-duplicates,return=representation" : undefined
    },
    body: body ? JSON.stringify(body) : undefined
  });
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function loadHistory(personne) {
  try {
    const rows = await supaRequest(
      "GET",
      "conseiller_messages?personne=eq." + encodeURIComponent(personne) + "&select=role,content&order=created_at.asc"
    );
    return rows || [];
  } catch (e) {
    console.error(e);
    return [];
  }
}

async function saveMessage(personne, role, content) {
  try {
    await supaRequest("POST", "conseiller_messages", { personne: personne, role: role, content: content });
  } catch (e) {
    console.error("Erreur sauvegarde message", e);
  }
}

function renderMessage(role, content) {
  const win = document.getElementById('chat-window');
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'user' : 'assistant');
  div.textContent = content;
  win.appendChild(div);
  win.scrollTop = win.scrollHeight;
  return div;
}

async function startChat(personKey) {
  currentPerson = personKey;
  document.getElementById('person-gate').style.display = 'none';
  document.getElementById('chat-app').style.display = 'flex';

  const history = await loadHistory(currentPerson);
  if (history.length === 0) {
    const greeting = "Salut Kéziah ! Je suis là pour t'aider à explorer des idées de métiers à partir de ce que tu as répondu au questionnaire. Tu veux qu'on regarde ensemble ce qui en ressort, ou t'as déjà une question en tête ?";
    renderMessage('assistant', greeting);
    messages.push({ role: 'assistant', content: greeting });
    saveMessage(currentPerson, 'assistant', greeting);
  } else {
    history.forEach(m => {
      renderMessage(m.role, m.content);
      messages.push({ role: m.role, content: m.content });
    });
  }
}

document.getElementById('btn-keziah').addEventListener('click', () => {
  startChat(normalizePersonKey("Kéziah"));
});

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  document.getElementById('send-btn').disabled = true;

  renderMessage('user', text);
  messages.push({ role: 'user', content: text });
  saveMessage(currentPerson, 'user', text);

  const thinkingEl = document.createElement('div');
  thinkingEl.className = 'msg thinking';
  thinkingEl.textContent = 'Le conseiller réfléchit...';
  document.getElementById('chat-window').appendChild(thinkingEl);
  document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;

  try {
    const res = await fetch(SUPABASE_URL + EDGE_FUNCTION_PATH, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + SUPABASE_KEY
      },
      body: JSON.stringify({ personne: currentPerson, messages: messages })
    });

    thinkingEl.remove();

    if (!res.ok) {
      const errText = await res.text();
      renderMessage('assistant', "Désolé, un souci technique est survenu. Réessaie dans un instant. (" + res.status + ")");
      console.error(errText);
      document.getElementById('send-btn').disabled = false;
      return;
    }

    const data = await res.json();
    const reply = data.reply || "Désolé, je n'ai pas pu générer de réponse.";
    renderMessage('assistant', reply);
    messages.push({ role: 'assistant', content: reply });
    saveMessage(currentPerson, 'assistant', reply);
  } catch (e) {
    thinkingEl.remove();
    renderMessage('assistant', "Désolé, un souci de connexion est survenu. Réessaie dans un instant.");
    console.error(e);
  }

  document.getElementById('send-btn').disabled = false;
}

document.getElementById('send-btn').addEventListener('click', sendMessage);
document.getElementById('msg-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
</script>
</body>
</html>
